<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Meridian — activity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/nav :: sidebar(${navActive})}"></div>
    <main class="main">
        <header class="main-head"><div><p class="eyebrow">History</p><h1>Activity</h1></div></header>

        <section class="panel">
            <table class="ledger" th:if="${!statement.isEmpty()}">
                <thead>
                <tr><th>When</th><th>Account</th><th>To</th><th>Type</th><th>Reference</th><th class="num">Amount</th><th>Status</th></tr>
                </thead>
                <tbody>
                <tr th:each="t : ${statement}">
                    <td class="muted" th:text="${t.when()}">3 Jun 2026, 14:02</td>
                    <td><code class="key" th:text="${t.accountId()}">acc-A</code></td>
                    <td th:text="${t.counterpartyName()}">CD Supplier</td>
                    <td th:text="${t.typeLabel()}">Transfer</td>
                    <td class="muted" th:text="${t.reference()} ?: '—'">Invoice 2043</td>
                    <td class="num" th:text="${t.amountEur()}">120.00</td>
                    <td><span class="status-pill" th:classappend="${t.statusClass()}" th:text="${t.status()}">Sent</span></td>
                </tr>
                </tbody>
            </table>
            <p th:if="${statement.isEmpty()}" class="muted">No activity yet.</p>
        </section>
    </main>
</div>
</body>
</html>
