<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Meridian — payments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/nav :: sidebar(${navActive})}"></div>
    <main class="main">
        <header class="main-head"><div><p class="eyebrow">Payments</p><h1>How would you like to pay?</h1></div></header>

        <div class="tiles">
            <a class="tile" th:href="@{/pay/payee}">
                <span class="tile-ic">↗</span>
                <span class="tile-title">Pay a saved payee</span>
                <span class="tile-sub">A SEPA transfer to someone you've paid before.</span>
            </a>
            <a class="tile" th:href="@{/pay/new}">
                <span class="tile-ic">＋</span>
                <span class="tile-title">Pay someone new</span>
                <span class="tile-sub">A one-off SEPA Credit Transfer to a new IBAN.</span>
            </a>
            <a class="tile" th:href="@{/pay/mobile}">
                <span class="tile-ic">☏</span>
                <span class="tile-title">Send to a mobile</span>
                <span class="tile-sub">An instant payment to a phone number.</span>
            </a>
        </div>
    </main>
</div>
</body>
</html>
