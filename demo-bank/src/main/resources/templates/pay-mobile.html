<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Meridian — send to a mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/nav :: sidebar(${navActive})}"></div>
    <main class="main">
        <p class="crumb"><a th:href="@{/pay}">← Payments</a></p>
        <header class="main-head"><div><p class="eyebrow">Instant payment</p><h1>Send to a mobile</h1></div></header>

        <section class="card narrow">
            <form method="post" th:action="@{/p2p}">
                <label>From account
                    <select name="account">
                        <option th:each="a : ${accounts}" th:value="${a.id}"
                                th:selected="${a.id} == ${selectedAccount}"
                                th:text="${a.displayName + ' (' + a.id + ')'}">acc-A</option>
                    </select>
                </label>
                <label>Mobile number <input type="text" name="alias" value="+35799123456" required/></label>
                <label>Recipient name <input type="text" name="resolvedName" value="George Papadopoulos" required/></label>
                <label>Amount (EUR)
                    <input type="number" name="amount" step="0.01" min="0.01" value="50.00" required/></label>
                <button type="submit" class="btn">Send</button>
            </form>
        </section>
    </main>
</div>
</body>
</html>
