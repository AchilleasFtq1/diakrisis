<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Meridian — error</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body class="login-page">
<div class="login-wrap">
    <div class="login-brand"><span class="mark">Mer<em>i</em>dian</span><span class="tag">Private Bank</span></div>
    <section class="verdict-hero block">
        <div class="bar"></div>
        <div class="body">
            <div class="verdict-row"><span class="badge" th:text="${errorTitle}">Error</span></div>
            <p class="verdict-msg" th:text="${errorMessage}">Something went wrong.</p>
        </div>
    </section>
    <p class="mt-md">
        <a class="btn ghost" th:href="@{/dashboard}">← Back to dashboard</a>
        <a class="btn" th:href="@{/}">Home</a>
    </p>
</div>
</body>
</html>
