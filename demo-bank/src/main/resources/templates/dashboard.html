<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Meridian — dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/nav :: sidebar(${navActive})}"></div>
    <main class="main">
        <header class="main-head">
            <div>
                <p class="eyebrow">Good day</p>
                <h1 th:text="${customer}">customer-A</h1>
            </div>
            <a class="btn" th:href="@{/pay}">↗ Make a payment</a>
        </header>

        <section class="acct-row">
            <article class="balance-card" th:each="acct : ${accounts}">
                <span class="bc-label">Available balance</span>
                <span class="bc-amount"><span th:text="${acct.availableBalanceEur}">4500.00</span><span class="cur">EUR</span></span>
                <span class="bc-meta"><span th:text="${acct.displayName}">Demo Retail Account A</span> · <code th:text="${acct.id}">acc-A</code></span>
                <a class="btn ghost sm" th:href="@{'/accounts/' + ${acct.id}}">View statement →</a>
            </article>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Recent activity</h2>
                <a class="link" th:href="@{/activity}">See all →</a>
            </div>
            <table class="ledger" th:if="${!recent.isEmpty()}">
                <thead>
                <tr><th>When</th><th>To</th><th>Type</th><th class="num">Amount</th><th>Status</th></tr>
                </thead>
                <tbody>
                <tr th:each="t : ${recent}">
                    <td class="muted" th:text="${t.when()}">3 Jun 2026, 14:02</td>
                    <td th:text="${t.counterpartyName()}">CD Supplier</td>
                    <td th:text="${t.typeLabel()}">Transfer</td>
                    <td class="num" th:text="${t.amountEur()}">120.00</td>
                    <td><span class="status-pill" th:classappend="${t.statusClass()}" th:text="${t.status()}">Sent</span></td>
                </tr>
                </tbody>
            </table>
            <p th:if="${recent.isEmpty()}" class="muted">No activity yet — make your first payment.</p>
        </section>
    </main>
</div>
</body>
</html>
