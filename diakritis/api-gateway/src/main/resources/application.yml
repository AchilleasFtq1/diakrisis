server:
  port: 8080

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      server:
        webmvc:
          # ------------------------------------------------------------------------------------------
          # Route table. Each route forwards to a backend base-url (configurable below via
          # diakrisis.backends.*; defaults to the localhost ports, overridable for container DNS).
          # Order matters: more specific predicates are listed first.
          # ------------------------------------------------------------------------------------------
          routes:
            # decision-service (:8081) — scoring + lifecycle. /decision (exact), /actions/**, /decisions/**
            - id: decision-decision
              uri: ${diakrisis.backends.decision-service}
              predicates:
                - Path=/decision
            - id: decision-actions
              uri: ${diakrisis.backends.decision-service}
              predicates:
                - Path=/actions/**
            - id: decision-decisions
              uri: ${diakrisis.backends.decision-service}
              predicates:
                - Path=/decisions/**

            # ops-service (:8082) — analyst dashboard projections.
            - id: ops
              uri: ${diakrisis.backends.ops-service}
              predicates:
                - Path=/ops/**

            # iam-service (:8083) — identity + admin console.
            - id: iam-auth
              uri: ${diakrisis.backends.iam-service}
              predicates:
                - Path=/auth/**
            - id: iam-admin
              uri: ${diakrisis.backends.iam-service}
              predicates:
                - Path=/admin/**

            # ------------------------------------------------------------------------------------------
            # OpenAPI doc proxies. Backends are NOT exposed to the host (only the gateway is), so the
            # aggregated Swagger UI cannot fetch their /v3/api-docs directly from the browser. These
            # routes proxy each backend's spec THROUGH the gateway at a gateway-local path, which the
            # UI group selector below points at. The specs' operation paths are relative (/decision,
            # /ops/**, ...), so "Try it out" fires back at the gateway origin — exercising the real
            # edge path, auth included. Public at the edge (EdgeAuthFilter allows /v3/api-docs/**).
            # ------------------------------------------------------------------------------------------
            - id: apidocs-decision
              uri: ${diakrisis.backends.decision-service}
              predicates:
                - Path=/v3/api-docs/decision-service
              filters:
                - RewritePath=/v3/api-docs/decision-service,/v3/api-docs
            - id: apidocs-ops
              uri: ${diakrisis.backends.ops-service}
              predicates:
                - Path=/v3/api-docs/ops-service
              filters:
                - RewritePath=/v3/api-docs/ops-service,/v3/api-docs
            - id: apidocs-iam
              uri: ${diakrisis.backends.iam-service}
              predicates:
                - Path=/v3/api-docs/iam-service
              filters:
                - RewritePath=/v3/api-docs/iam-service,/v3/api-docs

diakrisis:
  jwt:
    # Same secret the backends use to mint/verify; the gateway re-verifies at the edge (HS256, >=32 bytes).
    secret: ${DIAKRISIS_JWT_SECRET:diakrisis-local-development-secret-key-change-me}
  backends:
    # Backend base URLs. Default to the localhost dev ports; override (env / properties) for compose DNS.
    decision-service: ${DIAKRISIS_DECISION_URL:http://localhost:8081}
    ops-service: ${DIAKRISIS_OPS_URL:http://localhost:8082}
    iam-service: ${DIAKRISIS_IAM_URL:http://localhost:8083}

# ------------------------------------------------------------------------------------------------
# Aggregated Swagger UI: one UI at the gateway listing the three backends' live OpenAPI docs as
# groups. The group URLs are GATEWAY-LOCAL (the apidocs-* routes above proxy them to the backends),
# so the whole UI works through :8080 alone — the backends are not reachable from the browser.
# ------------------------------------------------------------------------------------------------
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    # Don't try to render a (non-existent) gateway-local spec; only the backend groups below.
    disable-swagger-default-url: true
    urls:
      - name: decision-service
        url: /v3/api-docs/decision-service
      - name: ops-service
        url: /v3/api-docs/ops-service
      - name: iam-service
        url: /v3/api-docs/iam-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
