server:
  port: 8083

spring:
  application:
    name: iam-service
  threads:
    virtual:
      enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

diakrisis:
  jwt:
    # Override in production via DIAKRISIS_JWT_SECRET; must be >= 32 bytes for HS256.
    secret: ${DIAKRISIS_JWT_SECRET:diakrisis-local-development-secret-key-change-me}
  dynamo:
    endpoint: ${DIAKRISIS_DYNAMO_ENDPOINT:http://localhost:8000}
    region: us-east-1
    auto-create: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
