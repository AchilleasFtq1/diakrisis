AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Diakrisis — the persistence layer on real AWS DynamoDB. Every table is the SAME table the running
  services read/write through the AWS SDK v2 enhanced client; only the endpoint differs (local
  DynamoDB → AWS). On-demand (PAY_PER_REQUEST) billing keeps it inside the AWS Always-Free tier for
  demo volumes (25 GB storage + 25 WCU/25 RCU free indefinitely). The 72h kill-chain decay is native
  DynamoDB TTL on the posture / observation / reputation tables — the store ages itself, no cron.

Parameters:
  TablePrefix:
    Type: String
    Default: ''
    Description: >
      Optional name prefix (e.g. "diakrisis-"). Leave blank to create the bare names the code expects
      (Decisions, Cases, …). If set, also set DIAKRISIS_DYNAMO_TABLE_PREFIX on the services.

Mappings: {}

Conditions: {}

# ----------------------------------------------------------------------------------------------------
# All tables share pk (HASH) + sk (RANGE), matching @DynamoDbPartitionKey/@DynamoDbSortKey in the
# common module. On-demand billing → no provisioned capacity to size or pay for when idle.
# ----------------------------------------------------------------------------------------------------
Resources:

  DecisionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Decisions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }

  CasesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Cases'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]

  OutcomesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Outcomes'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]

  # --- 72h-decay tables: native DynamoDB TTL on ttlEpochSec (the store ages itself) -----------------
  AccountPostureTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}AccountPosture'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]
      TimeToLiveSpecification: { AttributeName: ttlEpochSec, Enabled: true }

  ObservationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Observations'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]
      TimeToLiveSpecification: { AttributeName: ttlEpochSec, Enabled: true }

  CounterpartyReputationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}CounterpartyReputation'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]
      TimeToLiveSpecification: { AttributeName: ttlEpochSec, Enabled: true }

  # --- feature / baseline tables (written by the ETL, read at serve time) ---------------------------
  CounterpartyBaselineTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}CounterpartyBaseline'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]

  CounterpartyByNameTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}CounterpartyByName'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]

  AccountStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}AccountStats'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]

  AccountsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Accounts'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]

  PayeesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Payees'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]

  # --- identity ------------------------------------------------------------------------------------
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}Users'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]

  RefreshTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${TablePrefix}RefreshTokens'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{ AttributeName: pk, AttributeType: S }, { AttributeName: sk, AttributeType: S }]
      KeySchema: [{ AttributeName: pk, KeyType: HASH }, { AttributeName: sk, KeyType: RANGE }]
      TimeToLiveSpecification: { AttributeName: ttlEpochSec, Enabled: true }

Outputs:
  Region:
    Description: Region the tables were created in — point the services here.
    Value: !Ref AWS::Region
  Note:
    Description: How to switch the running services onto these tables.
    Value: >
      Unset DIAKRISIS_DYNAMO_ENDPOINT (so the SDK uses the real AWS endpoint), set AWS_REGION + creds,
      and the SAME @DynamoDbBean code reads/writes these tables. No engine code changes.
